name: "Secret Scanning — Alerts Summary"

on:
  schedule:
    # Runs weekly on Mondays at 07:00 UTC
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: read

jobs:
  secret-alerts-summary:
    name: "Secret Scanning Alerts Summary"
    runs-on: ubuntu-latest

    steps:
      - name: Build secret scanning summary
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              const alerts = await github.paginate('GET /repos/{owner}/{repo}/secret-scanning/alerts', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              core.summary
                .addHeading('🔐 Secret Scanning Summary')
                .addRaw(`Open alerts: **${alerts.length}**\n\n`)
                .addRaw('Use **Security → Secret scanning** to triage and remediate findings.\n')
                .addRaw('Map intentional findings in `SECURITY-EVAL.md`.\n')
                .write();
            } catch (error) {
              core.warning(`Unable to read secret scanning alerts in workflow context: ${error.message}`);
              core.summary
                .addHeading('🔐 Secret Scanning Summary')
                .addRaw('Alerts API not accessible from this workflow token context (typically missing `secret_scanning_alerts:read` permission or feature access limits).\n')
                .addRaw('Use **Security → Secret scanning** to review findings directly.\n')
                .write();
            }
