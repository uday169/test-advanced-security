name: "Security Gate — Block on Critical Findings"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: read
  statuses: write
  checks: write

jobs:
  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm install

      - name: npm audit — API (strict on main)
        id: audit_api
        run: npm audit --audit-level=critical --workspace=packages/api
        continue-on-error: true

      - name: npm audit — Client (strict on main)
        id: audit_client
        run: npm audit --audit-level=critical --workspace=packages/client
        continue-on-error: true

      - name: ESLint security scan
        id: eslint
        run: npm run lint --workspace=packages/api || true

      - name: Evaluate gate and post PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const auditApiFailed = '${{ steps.audit_api.outcome }}' === 'failure';
            const auditClientFailed = '${{ steps.audit_client.outcome }}' === 'failure';
            const eslintFailed = '${{ steps.eslint.outcome }}' === 'failure';
            const anyFailed = auditApiFailed || auditClientFailed || eslintFailed;
            const status = (failed) => failed ? '❌ FAIL' : '✅ PASS';

            const body = [
              '## 🛡️ Security Gate Results',
              '',
              '| Check | Result | Threshold |',
              '|-------|--------|-----------|',
              `| npm audit (API) | ${status(auditApiFailed)} | critical |`,
              `| npm audit (Client) | ${status(auditClientFailed)} | critical |`,
              `| ESLint security | ${status(eslintFailed)} | error |`,
              '',
              anyFailed
                ? '### ⛔ Gate FAILED — resolve findings before merge. See SECURITY-EVAL.md for intentional entries.'
                : '### ✅ Gate PASSED — No critical vulnerabilities detected.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

            if (anyFailed) {
              core.setFailed('Security gate failed. See PR comment for details.');
            }

      - name: Post gate summary
        if: always()
        run: |
          echo "## 🛡️ Security Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "Blocks merges to \`main\` on any **critical** npm audit finding." >> "$GITHUB_STEP_SUMMARY"
          echo "Findings should be reconciled with \`SECURITY-EVAL.md\`." >> "$GITHUB_STEP_SUMMARY"
